<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>noodle</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://use.typekit.net/znk3swa.css">
    </head>

    <style>
        #mydiv {
          position: absolute;
          z-index: 9;
          background-color: black;
          text-align: left;
          border-style: dotted;
          border-radius: 1px;
          border-color: aqua;
          
        }
        
        #mydivheader {
          padding: 10px;
          padding-bottom: 5px;
          cursor: move;
          z-index: 10;
          background-color: black;
          color: aqua;
          font-family: nudista-web;
          text-decoration: underline wavy;
          text-decoration-thickness: 1px;
          text-underline-offset: 4px;

              }

              
        </style>
    
    <body>
        
        <div class="textbg">
            <h1 class="title"; style="font-family:nudista-web">noodles</h1>
        </div>
      
        <div class="rotate">
            <video autoplay muted loop play width="80%" height="auto"> 
                <source src="Video/Rotate-min.webm"> 
            </video>
        </div>


<div id="mydiv">
  <div id="mydivheader">ingredients</div>
  <ul>
    <li>3 tbsp teriyaki sauce</li>
    <li>½ tsp Chinese five-spice powder</li>

  </ul>
</div>

<script>
//Make the DIV element draggagle:
dragElement(document.getElementById("mydiv"));

function dragElement(elmnt) {
  var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
   {
    /* otherwise, move the DIV from anywhere inside the DIV:*/
    elmnt.onmousedown = dragMouseDown;
  }

  function dragMouseDown(e) {
    e = e || window.event;
    e.preventDefault();
    // get the mouse cursor position at startup:
    pos3 = e.clientX;
    pos4 = e.clientY;
    document.onmouseup = closeDragElement;
    // call a function whenever the cursor moves:
    document.onmousemove = elementDrag;
  }

  function elementDrag(e) {
    e = e || window.event;
    e.preventDefault();
    // calculate the new cursor position:
    pos1 = pos3 - e.clientX;
    pos2 = pos4 - e.clientY;
    pos3 = e.clientX;
    pos4 = e.clientY;
    // set the element's new position:
    elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
    elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
  }

  function closeDragElement() {
    /* stop moving when mouse button is released:*/
    document.onmouseup = null;
    document.onmousemove = null;
  }
}
</script>



        

</body>
</html>
